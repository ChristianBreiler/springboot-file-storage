spring.application.name=springboot-file-storage
spring.datasource.url=jdbc:mariadb://localhost:3306/file_storage?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Christian2002
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true
# Frontend url
app.frontend.url=http://localhost:5173
# Disable Thymeleaf template caching for live reload
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
# email
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=auth_not_required
spring.mail.password=auth_not_required
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# Mail address that mails are sent from
spring.mail.properties.mail.from = "no-reply@test.com"
# jwt
security.jwt.secret-key=U3VwZXJTZWNyZXRLZXlGb3JKV1RUZXN0aW5nMTIzNDU2Nzg5MDEyMw==
security.jwt.expiration-time=3600000

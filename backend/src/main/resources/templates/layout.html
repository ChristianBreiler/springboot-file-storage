<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <link rel="icon" type="image/png" th:href="@{/images/folder_icon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<div th:insert="fragments/header :: header"></div>

<div class="app-layout">
    <aside class="sidebar">
        <nav>
            <ul class="nav flex-column">
                <li class="nav-item"><a th:href="@{/home}" class="nav-link active"><i
                        class="bx bx-home-circle"></i><span>Home</span></a>
                </li>
                <li class="nav-item"><a th:href="@{/deletedFiles}" class="nav-link"><i
                        class="bx bx-grid-alt"></i><span>Deleted Files</span></a>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content" layout:fragment="content">
        <!-- Page content here -->
    </main>
</div>

<footer></footer>

<style>
    /* Sidebar */
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        width: 5rem; /* collapsed width */
        background: linear-gradient(#90c3fd, #ba71ff, #ff71b8);
        overflow-x: hidden;
        padding: 1rem;
        transition: width 0.3s ease, box-shadow 0.3s ease;
        z-index: 1050;
        box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
    }

    /* Expanded sidebar overlays content */
    body.sb-expanded .sidebar {
        width: 12.5rem;
    }

    /* Sidebar links */
    .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .sidebar .nav-link {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        color: #fff;
        border-radius: 0.375rem;
        font-size: 1rem;
        transition: background 0.3s, color 0.3s;
    }

    .sidebar .nav-link span {
        opacity: 0;
        transition: opacity 0.3s;
    }

    body.sb-expanded .sidebar .nav-link span {
        opacity: 1;
    }

    .sidebar .nav-link.active,
    .sidebar .nav-link:hover {
        color: #b366fc;
        background: #fff;
    }

    /* Main content */
    .main-content {
        margin-left: 5rem; /* keeps content next to collapsed sidebar */
        padding: 1.5rem;
        transition: margin-left 0.3s ease;
    }
</style>

<script>
    const aside = document.querySelector(".sidebar");
    const body = document.body;

    // Expand sidebar on hover
    aside.addEventListener("mouseenter", () => {
        body.classList.add("sb-expanded");
    });

    aside.addEventListener("mouseleave", () => {
        body.classList.remove("sb-expanded");
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
<script th:src="@{/javascript/modals.js}"></script>
<script th:src="@{/javascript/drag-and-drop-controller.js}"></script>

</body>
</html>

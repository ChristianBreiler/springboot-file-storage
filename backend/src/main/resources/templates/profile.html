<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<section layout:fragment="content">
    <div class="container py-5">
        <div class="card mx-auto shadow-sm" style="max-width: 600px;">
            <div class="card-body text-center">
                <div id="profilePic" class="mb-3">
                    <button type="button" onclick="openProfilePicModal()" title="Upload New File"
                            class="btn btn-link p-0 border-0 bg-transparent">
                        <img th:src="${profilePic_id == null} ? @{/images/user.png} : @{//showimage/{id}(id=${profilePic_id})}"
                             alt="Profile Icon" width="120" height="120"
                             class="rounded-circle mb-3 border border-2">
                    </button>
                </div>
                <h3 class="fw-bold mb-3" th:text="${user.username}">Username</h3>
                <a href="/edit_profile" class="btn btn-primary btn-lg mb-4">
                    <img th:src="@{/images/add.png}" width="24" height="24" alt="Edit" class="me-2">
                    Edit Profile
                </a>
                <ul class="list-group text-start">
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>First Name:</strong> <span th:text="${user.firstname}">John</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>Last Name:</strong> <span th:text="${user.lastname}">Doe</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>Email:</strong> <span th:text="${user.emailaddress}">john@example.com</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>Role:</strong> <span th:text="${user.role}">Admin</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>Created at:</strong> <span th:text="${user.createdAt}">2025-01-01</span>
                    </li>
                </ul>
            </div>
        </div>
        <div th:if="${isAdmin}" class="mt-5">
            <h3>Admin Features</h3>
            <h4 class="mt-4">Users</h4>
            <ul th:each="user : ${allUsers}" class="list-group mt-2" style="max-width: 600px;">
                <li class="list-group-item" th:text="${user.username}"></li>
            </ul>
            <h4 class="mt-4">Messages</h4>
            <ul th:each="message : ${messages}" class="list-group mt-2">
                <li class="list-group-item" th:text="${message.message}"></li>
            </ul>
        </div>
    </div>
    <div class="modal fade" id="changeUsernameModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Change your username</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="renameFolderForm" method="post" action="/change_username">
                        <div class="mb-3">
                            <label for="renameFolderInput" class="form-label">New Username:</label>
                            <input type="text" id="renameFolderInput" name="username" class="form-control"
                                   placeholder="New Username" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Rename</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openProfilePicModal() {
        const modal = new bootstrap.Modal(document.getElementById('profilePicModal'));
        modal.show();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title th:text="${folder_name}">File Details</title>
    <link rel="icon" type="image/png" th:href="@{/images/folder_icon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous">
</head>
<body>
<h2>Folder Structure</h2>
<ul>
    <li th:replace="~{folder_tree :: folderNode(${tree})}"></li>
</ul>

<th:block th:fragment="folderNode(node)">
    <div class="folder" th:text="${node?.name}"></div>
    <ul th:if="${node?.subfolders != null and !#lists.isEmpty(node?.subfolders)}">
        <li th:each="subfolder : ${node?.subfolders}"
            th:replace="~{folder_tree :: folderNode(${subfolder})}">
        </li>
    </ul>
    <ul th:if="${node?.files != null and !#lists.isEmpty(node?.files)}">
        <li th:each="file : ${node?.files}">
            <a th:href="@{/open/{id}(id=${file?.id})}" target="_blank"
               class="text-decoration-none text-dark">
                <span class="file" th:text="${file?.name}"></span>
            </a>
        </li>
    </ul>
</th:block>
</body>
</html>

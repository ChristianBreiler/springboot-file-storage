<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<div th:fragment="sidebar">
    <aside class="sidebar">
        <nav>
            <ul class="nav flex-column">
                <li class="nav-item"><a th:href="@{/home}" class="nav-link active"><i
                        class="bx bx-home-circle"></i><span>Home</span></a></li>
                <li class="nav-item"><a th:href="@{/deletedFiles}" class="nav-link"><i class="bx bx-grid-alt"></i><span>Deleted Files</span></a>
                </li>
                <li class="nav-item"><a href="#" class="nav-link"><i
                        class="bx bx-carousel"></i><span>Slideshow</span></a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i
                        class="bx bx-collection"></i><span>Collections</span></a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i
                        class="bx bx-cloud-download"></i><span>Downloads</span></a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="bx bx-chat"></i><span>Messages</span></a>
                </li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="bx bx-cog"></i><span>Settings</span></a>
                </li>
            </ul>
        </nav>
    </aside>

    <style>
        .sidebar {
            position: fixed; /* overlay when expanded */
            top: 0;
            left: 0;
            height: 100%;
            width: 5rem; /* collapsed width */
            padding: 1rem;
            background: linear-gradient(#90c3fd, #ba71ff, #ff71b8);
            overflow-x: hidden;
            transition: width 0.3s ease, box-shadow 0.3s ease;
            z-index: 1050;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        /* Expanded sidebar overlays content */
        body.sb-expanded .sidebar {
            width: 12.5rem;
        }

        /* Main content */
        .main-content {
            margin-left: 5rem; /* next to collapsed sidebar */
            padding: 1.5rem;
            transition: margin-left 0.3s ease; /* optional */
        }

        /* Remove margin-left when sidebar overlays */
        body.sb-expanded .main-content {
            margin-left: 5rem; /* same as collapsed, content does not move */
        }

        /* Nav links */
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            color: #fff;
            border-radius: 0.375rem;
            font-size: 1rem;
            transition: background 0.3s, color 0.3s;
        }

        .sidebar .nav-link span {
            opacity: 0;
            transition: opacity 0.3s;
        }

        body.sb-expanded .sidebar .nav-link span {
            opacity: 1;
        }

        .sidebar .nav-link.active,
        .sidebar .nav-link:hover {
            color: #b366fc;
            background: #fff;
        }

    </style>

    <script>
        const aside = document.querySelector(".sidebar");
        const body = document.body;

        aside.addEventListener("mouseenter", () => {
            body.classList.add("sb-expanded");
        });

        aside.addEventListener("mouseleave", () => {
            body.classList.remove("sb-expanded");
        });
    </script>
</div>

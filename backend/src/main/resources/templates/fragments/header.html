<div th:fragment="header">
    <header class="d-flex align-items-center px-4 py-2 bg-light shadow-sm">
        <div class="flex-grow-1"></div>
        <form th:action="@{/home}"
              method="get"
              class="mx-auto"
              style="width: 520px; max-width: 100%;">
            <div class="input-group shadow-sm">
                <input type="search"
                       class="form-control"
                       id="mySearch"
                       name="name"
                       placeholder="Search files or folders…">
                <button class="btn btn-primary"
                        type="submit"
                        id="searchButton"
                        disabled>
                    <img th:src="@{/images/loupe.png}"
                         width="16"
                         height="16"
                         alt="Search">
                </button>
            </div>
            <script>
                const searchInput = document.getElementById('mySearch');
                const searchButton = document.getElementById('searchButton');

                searchInput.addEventListener('input', () => {
                    searchButton.disabled = searchInput.value.length === 0;
                });
            </script>
        </form>
        <div class="d-flex align-items-center gap-3 flex-grow-1 justify-content-end">
            <a th:href="@{/settings}" class="btn p-0 d-flex align-items-center" id="settingsButton">
                <img th:src="@{/images/settings.png}" width="22" height="22" alt="Settings">
            </a>
            <div class="dropdown">
                <button class="btn p-0 d-flex align-items-center"
                        type="button"
                        id="iconMenuButton"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                    <img th:src="@{/images/user.png}" width="32" height="32" class="rounded-circle" alt="User">
                </button>
                <ul class="dropdown-menu shadow-sm dropdown-menu-end">
                    <li>
                        <a class="dropdown-item d-flex align-items-center gap-2" th:href="@{/profile}">
                            <img th:src="@{/images/user.png}" width="20" height="20">
                            <span>Go to Profile</span>
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item d-flex align-items-center gap-2 text-danger" th:href="@{/logout}">
                            <img th:src="@{/images/logout.png}" width="20" height="20">
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <style>
        .dropdown {
            position: relative;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-menu {
            left: auto;
            right: 0;
            margin-top: 0;
        }

        #settingsButton:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }

        #iconMenuButton:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }
    </style>
</div>

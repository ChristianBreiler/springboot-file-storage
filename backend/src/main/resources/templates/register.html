<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Storage - Register</title>
    <link rel="icon" type="image/png" th:href="@{/images/folder_icon.png}">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
<div class="card shadow-lg border-0 p-4" style="max-width: 420px; width: 100%;">
    <div class="text-center mb-4">
        <img th:src="@{/images/folder_icon.png}" alt="Logo" width="60" class="mb-2">
        <h1 class="h3 fw-bold text-primary">File Storage</h1>
        <p class="text-muted mb-0">Create your account</p>
    </div>
    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" name="firstname" class="form-control" placeholder="John" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" name="lastname" class="form-control" placeholder="Doe" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Email Address</label>
            <input type="email" name="emailaddress" class="form-control" placeholder="example@mail.com" required>
        </div>
        <div class="mb-3">
            <label for="passwordField" class="form-label">Password</label>
            <div class="input-group">
                <input type="password" class="form-control" id="passwordField" name="password" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                    <img th:src="@{/images/show.png}" width="24" height="24" alt="Home" class="me-2"
                         id="showPasswordIcon">
                </button>
            </div>
        </div>
        <div class="mb-3">
            <label for="passwordField" class="form-label">Repeat Password</label>
            <div class="input-group">
                <input type="password" class="form-control" id="passwordRepeatField" name="passwordRepeat" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePasswordRepeat">
                    <img th:src="@{/images/show.png}" width="24" height="24" alt="Home" class="me-2"
                         id="showPasswordReapeatIcon">
                </button>
            </div>
        </div>
        <script>
            // Toggle password visibility
            const passwordField = document.getElementById('passwordField');
            const togglePassword = document.getElementById('togglePassword');
            togglePassword.addEventListener('click', () => {
                togglePasswordVisibility();
            });
            const togglePasswordRepeat = document.getElementById('togglePasswordRepeat');
            togglePasswordRepeat.addEventListener('click', () => {
                togglePasswordVisibility();
            });

            function togglePasswordVisibility() {
                const type = passwordField.type === 'password' ? 'text' : 'password';
                passwordField.type = type;
                const img = document.getElementById("showPasswordIcon");
                img.src = type === 'password' ? "/images/show.png" : "/images/hide.png";
            }
        </script>
        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary btn-lg">Register</button>
        </div>
        <div th:if="${param.error}" class="alert alert-danger text-center">
            Invalid username or password.
        </div>
    </form>
    <div class="text-center mt-3">
        <small class="text-muted">Already have an account? <a th:href="@{/login}" class="text-decoration-none">Log
            in</a></small>
    </div>
    <!-- Notifications -->
    <div th:if="${error}" class="alert alert-danger text-center">
        <span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success text-center">
        <span th:text="${success}"></span>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Deleted Files</title>
    <link rel="stylesheet" th:href="@{/css/card_highlighter.css}">
</head>
<body>
<section layout:fragment="content">
    <div class="container my-4">
        <div class="text-center mb-4">
            <h1 class="fw-bold">Deleted Files</h1>
            <p class="text-muted">
                <span th:text="${deletedFiles.size()}">0</span> files in trash
            </p>
        </div>
        <div class="row g-4 justify-content-center">
            <div th:each="file : ${deletedFiles}"
                 class="col-auto">
                <div class="card text-center shadow-sm draggable"
                     style="width: 250px; border-radius: 15px;"
                     draggable="true"
                     th:data-file-id="${file.id}"
                     th:data-file-name="${file.originalFilename}">
                    <a th:href="@{/open/{id}(id=${file.id})}"
                       target="_blank"
                       class="text-decoration-none text-dark">
                        <div class="p-3">
                            <div th:if="${file.filetype == Filetype.PNG}">
                                <img th:src="@{/showimage/{id}(id=${file.id})}"
                                     alt="File Image"
                                     class="img-fluid"
                                     style="height: 180px; object-fit: contain;">
                            </div>
                            <div th:if="${file.filetype == Filetype.PDF}">
                                <img th:src="@{/images/{image}(image=${file.fileImage})}"
                                     alt="PDF Preview"
                                     class="img-fluid"
                                     style="height: 180px; object-fit: contain;">
                            </div>
                        </div>
                    </a>
                    <div class="card-body pt-2">
                        <h6 class="card-title fw-semibold text-truncate"
                            th:text="${file.originalFilename}">
                            File Name
                        </h6>
                        <small class="text-muted d-block mb-2">
                            Deletes on:
                            <span th:text="${file.finalDeletionDate}"></span>
                        </small>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-light border dropdown-toggle"
                                    type="button"
                                    data-bs-toggle="dropdown"
                                    aria-expanded="false">
                                <img th:src="@{/images/dots.png}"
                                     alt="Menu"
                                     width="18"
                                     height="18">
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                                <li>
                                    <a class="dropdown-item text-danger d-flex align-items-center"
                                       onclick="confirmDeleteFilePermanently(this)"
                                       th:data-file-id="${file.id}"
                                       th:data-file-name="${file.originalFilename}">
                                        <img th:src="@{/images/delete.png}"
                                             alt="Delete"
                                             width="18"
                                             height="18"
                                             class="me-2">
                                        Delete permanently
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item text-danger d-flex align-items-center"
                                       onclick="confirmRestore(this)"
                                       th:data-file-id="${file.id}"
                                       th:data-file-name="${file.originalFilename}">
                                        <img th:src="@{/images/folder_upload.png}"
                                             alt="Delete"
                                             width="18"
                                             height="18"
                                             class="me-2">
                                        Restore
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal to permanently delete a file -->
    <div class="modal fade" id="deleteFilePermanentlyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Delete Folder</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to delete "<span id="modalFileName"></span>" permanently (cannot be undone) ?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <form id="confirmDeleteForm" method="post">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal to restore a file -->
    <div class="modal fade" id="restoreFileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Restore File</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to restore "<span id="modalFileForRestoringName"></span>"?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <form id="confirmRestoreForm" method="post">
                        <button type="submit" class="btn btn-success">Restore</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>
        function confirmDeleteFilePermanently(button) {
            const fileId = button.getAttribute('data-file-id');
            const fileName = button.getAttribute('data-file-name');

            document.getElementById('modalFileName').textContent = fileName;
            document.getElementById('confirmDeleteForm')
                .setAttribute('action', `/deletedFiles/delete_file_permanently/${fileId}`);

            const modal = new bootstrap.Modal(document.getElementById('deleteFilePermanentlyModal'));
            modal.show();
        }

        function confirmRestore(button) {
            const fileId = button.getAttribute('data-file-id');
            const fileName = button.getAttribute('data-file-name');

            document.getElementById('modalFileForRestoringName').textContent = fileName;
            document.getElementById('confirmRestoreForm')
                .setAttribute('action', `/deletedFiles/restore_file/${fileId}`);

            const modal = new bootstrap.Modal(document.getElementById('restoreFileModal'));
            modal.show();
        }
    </script>
</section>
</body>
</html>

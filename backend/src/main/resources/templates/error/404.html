<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found - 404</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container-404 {
            text-align: center;
        }

        .container-404 h1 {
            font-size: 8rem;
            font-weight: bold;
            color: #dc3545;
        }

        .container-404 h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .container-404 p {
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .btn-home {
            font-size: 1.2rem;
            padding: 0.75rem 2rem;
        }
    </style>
</head>
<body>
<div class="container-404">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for might have been removed or is temporarily unavailable.</p>
    <a th:href="@{/home}" class="btn btn-primary btn-home">Go to Homepage</a>
</div>
</body>
</html>
